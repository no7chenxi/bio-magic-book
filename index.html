
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genos 魔法解码器 | 手机完美版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float-slow { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(10px, -10px); } }
        body { background: #020617; color: #F1F5F9; margin: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'system-ui', sans-serif; touch-action: none; }
        #flashlight-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle 100px at var(--x) var(--y), transparent 0%, rgba(2, 6, 23, 0.98) 100%); pointer-events: none; z-index: 50; transition: background 0.4s; }
        .treasure-container { position: absolute; width: 70px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); animation: float-slow 8s ease-in-out infinite; z-index: 10; }
        @media (min-width: 768px) { .treasure-container { width: 100px; height: 100px; } }
        .treasure-icon { font-size: 2rem; transition: all 0.4s; filter: grayscale(1) opacity(0.15); }
        @media (min-width: 768px) { .treasure-icon { font-size: 2.8rem; } }
        .treasure-container.active { z-index: 60; transform: scale(2.2) !important; animation-play-state: paused; }
        .treasure-container.active .treasure-icon { filter: grayscale(0) opacity(1) drop-shadow(0 0 20px var(--glow)) !important; }
        .treasure-container.unlocked { display: none; }
        .progress-ring { position: absolute; width: 90px; height: 90px; transform: rotate(-90deg); opacity: 0; transition: opacity 0.3s; }
        .progress-ring circle { fill: transparent; stroke: var(--glow); stroke-width: 4; stroke-dasharray: 251; stroke-dashoffset: 251; transition: stroke-dashoffset 3s linear; }
        .treasure-container.active .progress-ring { opacity: 1; }
        .treasure-container.loading circle { stroke-dashoffset: 0; }
        .info-bubble {
            position: fixed; left: 50%; top: 120px; width: 280px; transform: translateX(-50%) scale(0.9);
            background: rgba(15, 23, 42, 0.98); border: 2px solid var(--glow); padding: 18px; border-radius: 24px;
            opacity: 0; visibility: hidden; transition: 0.3s; pointer-events: none; z-index: 100;
        }
        @media (min-width: 768px) { .info-bubble { position: absolute; left: 110%; top: -50%; width: 260px; transform: none; } }
        .treasure-container.active .info-bubble { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        #collection-shelf { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border-top: 1px solid rgba(34, 211, 238, 0.2); display: flex; align-items: center; padding: 0 20px; gap: 8px; z-index: 100; overflow-x: auto; }
        .shelf-slot { width: 35px; height: 35px; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.05); border: 1px dashed rgba(34, 211, 238, 0.3); display: flex; align-items: center; justify-content: center; font-size: 1rem; opacity: 0.2; }
        .shelf-slot.filled { background: rgba(34, 211, 238, 0.1); border-style: solid; opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="flashlight-overlay"></div>
    <div id="sound-init" class="fixed inset-0 z-[1000] bg-black/90 flex flex-col items-center justify-center text-center p-10">
        <div class="text-6xl mb-6">🎵</div>
        <h2 class="text-2xl font-bold mb-4">准备开启大探险</h2>
        <p class="text-gray-400 mb-8 max-w-xs text-sm">点击按钮进入“身体魔法书”，开启音乐与超能力探测仪！</p>
        <button onclick="initApp()" class="px-12 py-4 bg-cyan-500 text-black font-black rounded-full text-xl shadow-[0_0_30px_rgba(34,211,238,0.5)]">开启魔法之旅</button>
    </div>
    <div class="fixed top-6 left-6 z-[70]">
        <h1 class="text-2xl font-black italic text-cyan-400">身体<span class="text-white">魔法书</span></h1>
        <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">瞄准秘密 3 秒钟解锁</p>
    </div>
    <div class="fixed top-6 right-6 z-[70] text-right">
        <div id="progress-val" class="text-3xl font-black text-cyan-500">0/22</div>
    </div>
    <div id="treasure-field" class="relative w-full h-full"></div>
    <div id="collection-shelf"></div>
    <div id="milestone-modal" class="fixed inset-0 bg-black/90 hidden flex-col items-center justify-center z-[200] text-center p-10" onclick="this.style.display='none'">
        <div class="text-7xl mb-6" id="m-icon"></div>
        <h2 class="text-3xl font-black text-white mb-2" id="m-title"></h2>
        <p class="text-lg text-cyan-400 mb-8" id="m-desc"></p>
        <button class="px-10 py-3 bg-white text-black font-black rounded-full">继续寻宝</button>
    </div>

    <script>
        let audioCtx = null;
        let bgmInterval = null;

        function initApp() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('sound-init').style.display = 'none';
            playBGM();
            distributeTreasures();
        }

        function playTone(freq, type, duration, vol) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playBGM() {
            const melody = [261.63, 293.66, 329.63, 392.00, 349.23, 329.63, 293.66, 261.63]; // C D E G F E D C
            let idx = 0;
            bgmInterval = setInterval(() => {
                playTone(melody[idx % melody.length], "triangle", 0.5, 0.02);
                idx++;
            }, 600);
        }

        const database = [
            { icon: "🧠", bio: "大脑", ai: "总司令", fact: "它管着你所有的想法！", secret: "开关让你学得飞快！", glow: "#C4B5FD" },
            { icon: "👁️", bio: "眼睛", ai: "摄像机", fact: "看清全世界的美丽。", secret: "开关决定眼睛亮不亮！", glow: "#A5F3FC" },
            { icon: "👂", bio: "耳朵", ai: "小喇叭", fact: "听见风声雨声。", secret: "藏着音乐家的魔法。", glow: "#F9A8D4" },
            { icon: "👅", bio: "舌头", ai: "测试仪", fact: "分辨甜咸保护身体。", secret: "决定你喜不喜欢吃！", glow: "#D9F99D" },
            { icon: "🖐️", bio: "小手", ai: "感应器", fact: "摸出云朵和石头。", secret: "手巧的小朋友开关开啦！", glow: "#FDBA74" },
            { icon: "❤️", bio: "心脏", ai: "充电站", fact: "咚咚跳送能量。", secret: "节电开关让你不累。", glow: "#FF8787" },
            { icon: "💪", bio: "肌肉", ai: "小马达", fact: "想动哪里肌肉就干活。", secret: "DNA里藏着超人马达！", glow: "#FDE68A" },
            { icon: "🩸", bio: "血液", ai: "小火车", fact: "送好吃的和氧气。", secret: "火车跑得稳才有劲儿！", glow: "#FCA5A5" },
            { icon: "🦴", bio: "骨骼", ai: "小架子", fact: "搭积木把你搭高高。", secret: "开关决定长高时间！", glow: "#E2E8F0" },
            { icon: "🛡️", bio: "卫兵", ai: "小盾牌", fact: "把病毒全都赶跑！", secret: "多运动让卫兵更强壮。", glow: "#93C5FD" },
            { icon: "🔋", bio: "睡觉", ai: "超级充电", fact: "大脑在整理本事呢！", secret: "睡醒变聪明！", glow: "#C084FC" },
            { icon: "👶", bio: "长大", ai: "更新包", fact: "每天长高一点点。", secret: "你每天都在变棒！", glow: "#FED7AA" },
            { icon: "🍌", bio: "香蕉", ai: "共有秘密", fact: "你和香蕉是亲戚！", secret: "生命共享好玩秘密。", glow: "#FEF08A" },
            { icon: "🐱", bio: "小猫", ai: "反应冠军", fact: "和猫秘密90%一样。", secret: "找猫咪不会说话原因。", glow: "#BFDBFE" },
            { icon: "🦍", bio: "猩猩", ai: "聪明宝贝", fact: "猩猩和你特别像！", secret: "让你学会了写字画。 ", glow: "#E2E8F0" },
            { icon: "🌳", bio: "大树", ai: "大网络", fact: "大树是我们的朋友。", secret: "在大自然里最开心。", glow: "#BBF7D0" },
            { icon: "🦠", bio: "病毒", ai: "小怪兽", fact: "想弄坏你的小怪兽。", secret: "做一个终极盾牌。", glow: "#F87171" },
            { icon: "🧬", bio: "磁带", ai: "存储器", fact: "记着出生的秘密。", secret: "寻找变勇敢的秘密。", glow: "#FDA4AF" },
            { icon: "🕸️", bio: "神经", ai: "快递员", fact: "传消息比风快！", secret: "消息跑得特别快。", glow: "#86EFAC" },
            { icon: "🌬️", bio: "呼吸", ai: "加油站", fact: "吸一口全身有力气。", secret: "补给包特别大！", glow: "#99F6E4" },
            { icon: "🧩", bio: "拼图", ai: "好办法", fact: "拼成完美的自己！", secret: "你是最强小主人！", glow: "#A5B4FC" },
            { icon: "✨", bio: "灵魂", ai: "原创代码", fact: "你是唯一的宝贝。", secret: "你会创造奇迹！", glow: "#FFF" }
        ];

        const field = document.getElementById('treasure-field');
        const shelf = document.getElementById('collection-shelf');
        const overlay = document.getElementById('flashlight-overlay');
        let unlockedCount = 0; let activeIndex = -1; let unlockTimer = null;

        database.forEach((_, i) => {
            const slot = document.createElement('div');
            slot.className = "shelf-slot"; slot.id = `slot-${i}`;
            shelf.appendChild(slot);
        });

        function distributeTreasures() {
            field.innerHTML = '';
            const w = window.innerWidth; const h = window.innerHeight;
            const safeW = w - 100; const safeH = h - 250;
            database.forEach((item, index) => {
                const container = document.createElement('div');
                container.className = "treasure-container"; container.id = `treasure-${index}`;
                container.style.left = (50 + Math.random() * (safeW - 50)) + 'px';
                container.style.top = (150 + Math.random() * (safeH - 150)) + 'px';
                container.style.setProperty('--glow', item.glow);
                container.innerHTML = `
                    <svg class="progress-ring" viewBox="0 0 120 120"><circle cx="60" cy="60" r="40"></circle></svg>
                    <div class="treasure-icon">${item.icon}</div>
                    <div class="info-bubble">
                        <div class="text-[8px] font-black text-cyan-500 uppercase mb-1">#${item.bio} == ${item.ai}</div>
                        <p class="text-[10px] text-gray-200 leading-tight mb-2">${item.fact}</p>
                        <div class="pt-2 border-t border-white/10 text-[8px] text-cyan-400 italic">⭐ 秘密: ${item.secret}</div>
                    </div>
                `;
                field.appendChild(container);
            });
        }

        const handleAction = (x, y) => {
            overlay.style.setProperty('--x', x + 'px');
            overlay.style.setProperty('--y', y + 'px');
            let match = -1;
            document.querySelectorAll('.treasure-container').forEach((c, idx) => {
                if(c.classList.contains('unlocked')) return;
                const r = c.getBoundingClientRect();
                if(Math.hypot(x - (r.left + r.width/2), y - (r.top + r.height/2)) < 50) match = idx;
            });
            if(match !== activeIndex) {
                document.querySelectorAll('.treasure-container').forEach(c => c.classList.remove('active', 'loading'));
                clearTimeout(unlockTimer);
                if(match !== -1) {
                    const t = document.getElementById(`treasure-${match}`);
                    t.classList.add('active');
                    setTimeout(() => t.classList.add('loading'), 100);
                    playTone(600, "sine", 0.1, 0.05);
                    unlockTimer = setTimeout(() => unlock(match), 3100);
                    overlay.style.background = `radial-gradient(circle 120px at var(--x) var(--y), transparent 0%, ${database[match].glow}22 40%, rgba(2, 6, 23, 0.98) 100%)`;
                } else {
                    overlay.style.background = `radial-gradient(circle 100px at var(--x) var(--y), transparent 0%, rgba(2, 6, 23, 0.98) 100%)`;
                }
                activeIndex = match;
            }
        };

        document.addEventListener('mousemove', (e) => handleAction(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            handleAction(t.clientX, t.clientY);
        }, { passive: false });

        function unlock(idx) {
            const t = document.getElementById(`treasure-${idx}`);
            t.classList.add('unlocked');
            document.getElementById(`slot-${idx}`).innerHTML = database[idx].icon;
            document.getElementById(`slot-${idx}`).classList.add('filled');
            unlockedCount++;
            document.getElementById('progress-val').innerText = unlockedCount + "/22";
            playTone(880, "sine", 0.3, 0.1);
            if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            checkMilestone();
        }

        function checkMilestone() {
            const ms = [
                { count: 5, title: "初级破译员！", desc: "发现了 5 个秘密，基地亮起来啦！", icon: "🧚" },
                { count: 10, title: "魔法科学家！", desc: "10 个秘密！你对 AI 了解太深了！", icon: "✨" },
                { count: 15, title: "金牌解码员！", desc: "Genos 模型为你欢呼！", icon: "🏅" },
                { count: 22, title: "身体小主人！", desc: "你点亮了所有生命星图！", icon: "👑" }
            ];
            const m = ms.find(m => m.count === unlockedCount);
            if(m) {
                document.getElementById('m-icon').innerText = m.icon;
                document.getElementById('m-title').innerText = m.title;
                document.getElementById('m-desc').innerText = m.desc;
                document.getElementById('milestone-modal').style.display = 'flex';
                playTone(523, "square", 0.5, 0.1);
            }
        }
    </script>
</body>
</html>
