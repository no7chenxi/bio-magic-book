
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Genos 魔法书 | 星际探险版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        @keyframes float-slow { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(15px, -15px); } }
        @keyframes star-blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes meteor { 0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateX(-500px) translateY(500px) rotate(-45deg); opacity: 0; } }
        
        body { 
            background: radial-gradient(circle at center, #1E293B 0%, #020617 100%);
            color: #F1F5F9; margin: 0; height: 100dvh; width: 100vw;
            overflow: hidden; font-family: system-ui, sans-serif;
            touch-action: none; position: fixed;
        }

        /* 宇宙背景星空 */
        #stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: star-blink var(--d) infinite; }
        .meteor { position: absolute; width: 2px; height: 100px; background: linear-gradient(to bottom, white, transparent); opacity: 0; animation: meteor 4s linear infinite; animation-delay: var(--delay); }

        #flashlight-overlay { position: fixed; inset: 0; background: radial-gradient(circle 120px at var(--x) var(--y), transparent 0%, rgba(2, 6, 23, 0.95) 100%); pointer-events: none; z-index: 50; }
        
        .treasure-container { 
            position: absolute; width: 120px; height: 120px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: float-slow 10s ease-in-out infinite; z-index: 10;
        }
        .treasure-icon { font-size: 3.5rem; filter: grayscale(1) opacity(0.2); transition: 0.4s; }
        
        /* 锁定反馈：尺寸巨大化 */
        .treasure-container.active { z-index: 60; transform: scale(2.2) translateY(-60px) !important; }
        .treasure-container.active .treasure-icon { filter: grayscale(0) opacity(1) drop-shadow(0 0 30px var(--glow)); }
        .treasure-container.unlocked { display: none !important; }

        .progress-ring { position: absolute; width: 140px; height: 140px; transform: rotate(-90deg); opacity: 0; }
        .progress-ring circle { fill: transparent; stroke: var(--glow); stroke-width: 8; stroke-dasharray: 251; stroke-dashoffset: 251; transition: stroke-dashoffset 3s linear; }
        .treasure-container.active .progress-ring { opacity: 1; }
        .treasure-container.loading circle { stroke-dashoffset: 0; }

        #info-layer { position: fixed; top: calc(100px + var(--sat)); left: 50%; transform: translateX(-50%); width: 90%; max-width: 340px; z-index: 100; pointer-events: none; }
        .info-card { background: rgba(15, 23, 42, 0.95); border: 3px solid var(--glow); padding: 20px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); backdrop-filter: blur(15px); opacity: 0; transform: translateY(-20px); transition: 0.4s; }
        .info-card.visible { opacity: 1; transform: translateY(0); }

        #map-panel { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(90px + var(--sab)); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(34, 211, 238, 0.2); z-index: 100; display: flex; align-items: center; padding: 0 20px; overflow-x: auto; scroll-behavior: smooth; }
        .map-slot { width: 45px; height: 45px; border-radius: 12px; flex-shrink: 0; background: rgba(255,255,255,0.05); border: 1px dashed rgba(34, 211, 238, 0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; opacity: 0.2; transition: 0.5s; }
        .map-slot.filled { background: rgba(34, 211, 238, 0.15); border-style: solid; opacity: 1; transform: scale(1.1); }

        /* 最终证书页面 */
        #final-ceremony { position: fixed; inset: 0; z-index: 300; background: radial-gradient(circle, #1E293B, #020617); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .certificate { background: #FFF; color: #0F172A; padding: 40px 30px; border-radius: 40px; text-align: center; box-shadow: 0 0 100px rgba(34, 211, 238, 0.5); max-width: 380px; border: 8px solid #FFD700; animation: fadeIn 1s forwards; }
    </style>
</head>
<body>
    <!-- 动态星空 -->
    <div id="stars-bg"></div>
    <div id="flashlight-overlay"></div>
    
    <div id="sound-init" class="fixed inset-0 z-[1000] bg-[#020617] flex flex-col items-center justify-center text-center p-8">
        <div class="text-7xl mb-6">🪐</div><h2 class="text-3xl font-black mb-10 text-cyan-400 italic">GALAXY ADVENTURE</h2>
        <button onclick="initApp()" class="px-16 py-5 bg-white text-black font-black rounded-full text-xl">开启星际探险</button>
    </div>

    <!-- 顶部状态 -->
    <div class="fixed top-[calc(20px+var(--sat))] left-6 right-6 z-[150] flex justify-between items-start pointer-events-none">
        <h1 class="text-2xl font-black italic text-cyan-400 tracking-tighter">身体<span class="text-white">魔法书</span></h1>
        <div id="progress-val" class="text-xl font-black text-cyan-500">0/22</div>
    </div>

    <!-- 卡片展示 -->
    <div id="info-layer" class="mx-auto left-0 right-0">
        <div id="info-card" class="info-card mx-auto">
            <h4 id="info-bio" class="text-xl font-black text-white"></h4>
            <p id="info-fact" class="text-sm text-gray-300 mt-2 mb-4 leading-relaxed"></p>
            <div id="info-secret" class="pt-3 border-t border-white/10 text-[11px] text-cyan-400 italic"></div>
        </div>
    </div>

    <div id="treasure-field" class="relative w-full h-full"></div>
    <div id="map-panel"></div>

    <div id="final-ceremony">
        <div class="certificate">
            <div class="text-5xl mb-4">🏆</div>
            <h2 class="text-xs font-black text-gray-400 tracking-widest mb-2 uppercase">GENOS LAB HONOR</h2>
            <h1 class="text-3xl font-black text-gray-900 mb-6">生命代码大师</h1>
            <div class="bg-gray-50 p-6 rounded-3xl mb-8 text-left text-xs leading-relaxed text-gray-600">
                <b>🎓 探险成就：</b><br>
                ✨ 掌握了 30 亿行生命源代码的奥秘。<br>
                👁️ 发现并对齐了人体与 AI 的智能组件。<br>
                🦉 用 Genos 模型点亮了微观星图。
            </div>
            <button onclick="location.reload()" class="bg-gray-900 text-white px-10 py-3 rounded-full font-black text-xs">再次起航</button>
        </div>
    </div>

    <div id="milestone-modal" class="fixed inset-0 bg-black/95 hidden flex-col items-center justify-center z-[200] text-center p-10" onclick="this.style.display='none'">
        <div class="text-8xl mb-6">🎖️</div><h2 id="m-title" class="text-3xl font-black text-white mb-2 italic"></h2><p id="m-desc" class="text-lg text-cyan-400 mb-8"></p><button class="px-10 py-3 bg-white text-black font-black rounded-full">继续寻找</button>
    </div>

    <script>
        // --- 核心：生成宇宙星空 ---
        function createUniverse() {
            const bg = document.getElementById('stars-bg');
            for(let i=0; i<100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 3 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                bg.appendChild(s);
            }
            // 流星
            for(let i=0; i<3; i++) {
                const m = document.createElement('div');
                m.className = 'meteor';
                m.style.left = (Math.random() * 100 + 50) + '%';
                m.style.top = (Math.random() * 50) + '%';
                m.style.setProperty('--delay', (i * 5) + 's');
                bg.appendChild(m);
            }
        }

        // --- 数据库 (萌系文案) ---
        const database = [
            { icon: "🧠", bio: "聪明的大脑", ai: "身体总司令", fact: "管着你所有的想法！AI就在学大脑聪明的办法哦。", secret: "神奇小开关能让你学得飞快！", glow: "#C4B5FD" },
            { icon: "👁️", bio: "明亮的眼睛", ai: "超级摄像机", fact: "眼睛能看清全世界的美丽。它像摄像机一样传照片。", secret: "开关决定了你的眼睛亮不亮！", glow: "#A5F3FC" },
            { icon: "👂", bio: "灵敏的耳朵", ai: "声音小喇叭", fact: "它能听见风声雨声。它是声音的翻译官。", secret: "耳朵里藏着音乐家的魔法。", glow: "#F9A8D4" },
            { icon: "👅", bio: "调皮的舌头", ai: "味道测试仪", fact: "告诉你什么是甜的、什么是咸的。不吃错东西。", secret: "决定你喜不喜欢吃冰淇淋！", glow: "#D9F99D" },
            { icon: "🖐️", bio: "温柔的小手", ai: "感应器", fact: "手能摸出软软的云朵。它是感觉的专家。", secret: "手巧的小朋友开关打开啦！", glow: "#FDBA74" },
            { icon: "❤️", bio: "爱跳的心脏", ai: "能量充电站", fact: "它每天都在咚咚跳给全身送能量。它是英雄。", secret: "有些人节电开关厉害，运动不累。", glow: "#FF8787" },
            { icon: "💪", bio: "有力小肌肉", ai: "超人小马达", fact: "你想动哪里肌肉就干活。AI机器人也是这样。", secret: "DNA里藏着超人马达！", glow: "#FDE68A" },
            { icon: "🩸", bio: "红红的血液", ai: "生命小火车", fact: "给每一个小细胞送好吃的和氧气。", secret: "火车跑得越稳才有劲儿！", glow: "#FCA5A5" },
            { icon: "🦴", bio: "硬硬的骨头", ai: "身体的小架子", fact: "骨头撑起你的身体，像搭积木一样把你搭高高。", secret: "魔法开关决定长高时间！", glow: "#E2E8F0" },
            { icon: "🛡️", bio: "勇敢小卫兵", ai: "病毒小盾牌", fact: "在身体里巡逻，把调皮的坏蛋病毒全赶跑！", secret: "多喝水、多运动让卫兵更强壮。", glow: "#93C5FD" },
            { icon: "🔋", bio: "甜甜的觉觉", ai: "超级充电", fact: "睡觉时大脑在整理白天学到的本事！", secret: "睡醒变聪明！", glow: "#C084FC" },
            { icon: "👶", bio: "慢慢长大", ai: "系统更新", fact: "每天长高一点点，在下载新的成长包。", secret: "你每天都在变得更棒！", glow: "#FED7AA" },
            { icon: "🍌", bio: "香蕉好朋友", ai: "共有小秘密", fact: "原来你和香蕉是亲戚！都要喝水呼吸。", secret: "生命大家都共用一些好玩的秘密！", glow: "#FEF08A" },
            { icon: "🐱", bio: "灵敏的小猫", ai: "反应小冠军", fact: "和猫秘密90%是一样的。你也机灵！", secret: "找猫咪只会喵喵叫的原因。", glow: "#BFDBFE" },
            { icon: "🦍", bio: "猩猩邻居", ai: "测试版代码", fact: "猩猩和你特别像！咱们都是聪明宝贝。", secret: "剩下的那1%让你学会了写字画画。", glow: "#E2E8F0" },
            { icon: "🌳", bio: "绿绿的大树", ai: "大网络", fact: "大树是我们的朋友，给咱们新鲜空气。", secret: "在大森林里你的代码运行最开心！", glow: "#BBF7D0" },
            { icon: "🦠", bio: "坏蛋小病毒", ai: "捣乱小怪兽", fact: "总有小怪兽想弄坏你，但卫兵会保护你。", secret: "正在教身体做一个终极盾牌。", glow: "#F87171" },
            { icon: "🧬", bio: "生命磁带", ai: "超级硬盘", fact: "记着出生的秘密。它是宇宙最大的宝库！", secret: "Genos读磁带寻找勇敢的秘密。", glow: "#FDA4AF" },
            { icon: "🕸️", bio: "神奇的神经", ai: "消息快递员", fact: "传消息比风还快！脚尖碰了下秒知道。", secret: "远端开关决定了消息跑多快。", glow: "#86EFAC" },
            { icon: "🌬️", bio: "大口呼吸", ai: "补给包", fact: "深呼吸一口全身有力气！这是在加油。", secret: "爱运动的小朋友补给包特别大！", glow: "#99F6E4" },
            { icon: "🧩", bio: "生命大拼图", ai: "变聪明办法", fact: "三亿年，才拼成现在完美的你！", secret: "你是这套办法的厉害小主人！", glow: "#A5B4FC" },
            { icon: "✨", bio: "唯一的你", ai: "原创逻辑", fact: "你是独一无二的宝贝，没人和你一样。", secret: "未来你会创造出伟大的奇迹！", glow: "#FFF" }
        ];

        let audioCtx, unlockedCount = 0, activeIndex = -1, unlockTimer, gameActive = true;

        function initApp() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume().then(() => {
                document.getElementById('sound-init').style.display = 'none';
                createUniverse(); playSummerBGM(); setupMap(); distribute();
            });
        }

        function setupMap() {
            const panel = document.getElementById('map-panel');
            for(let i=0; i<22; i++) {
                const slot = document.createElement('div');
                slot.className = "map-slot"; slot.id = `slot-${i}`; panel.appendChild(slot);
            }
        }

        function distribute() {
            const field = document.getElementById('treasure-field'); field.innerHTML = '';
            const w = window.innerWidth, h = window.innerHeight;
            const topSafe = 180, bottomSafe = 150, sideSafe = 60;
            database.forEach((item, index) => {
                const c = document.createElement('div');
                c.className = "treasure-container"; c.id = `treasure-${index}`;
                c.style.left = (sideSafe + Math.random() * (w - sideSafe*2 - 120)) + 'px';
                c.style.top = topSafe + (index % 5) * ((h - topSafe - bottomSafe) / 5) + 'px'; // 均匀网格防止跑偏
                c.style.setProperty('--glow', item.glow);
                c.innerHTML = `<svg class="progress-ring" viewBox="0 0 120 120"><circle cx="60" cy="60" r="45"></circle></svg><div class="treasure-icon">${item.icon}</div>`;
                field.appendChild(c);
            });
        }

        const handleMove = (x, y) => {
            if(!gameActive) return;
            const overlay = document.getElementById('flashlight-overlay');
            overlay.style.setProperty('--x', x + 'px'); overlay.style.setProperty('--y', y + 'px');
            let match = -1;
            document.querySelectorAll('.treasure-container').forEach((c, idx) => {
                if(c.classList.contains('unlocked')) return;
                const r = c.getBoundingClientRect();
                if(Math.hypot(x - (r.left + r.width/2), y - (r.top + r.height/2)) < 80) match = idx;
            });

            if(match !== activeIndex) {
                document.querySelectorAll('.treasure-container').forEach(c => c.classList.remove('active', 'loading'));
                document.getElementById('info-card').style.opacity = '0';
                clearTimeout(unlockTimer);
                if(match !== -1) {
                    const t = document.getElementById(`treasure-${match}`);
                    const d = database[match];
                    t.classList.add('active'); setTimeout(() => t.classList.add('loading'), 50);
                    document.getElementById('info-bio').innerText = d.bio;
                    document.getElementById('info-fact').innerText = d.fact;
                    document.getElementById('info-secret').innerText = `⭐ 秘密: ${d.secret}`;
                    document.getElementById('info-card').style.opacity = '1';
                    document.getElementById('info-card').style.transform = 'translateY(0)';
                    playTone(600, 0.1, 0.05);
                    unlockTimer = setTimeout(() => doUnlock(match), 3100);
                    overlay.style.background = `radial-gradient(circle 150px at var(--x) var(--y), transparent 0%, ${d.glow}22 40%, rgba(2, 6, 23, 0.98) 100%)`;
                } else {
                    overlay.style.background = `radial-gradient(circle 90px at var(--x) var(--y), transparent 0%, rgba(2, 6, 23, 0.98) 100%)`;
                }
                activeIndex = match;
            }
        };

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));

        function doUnlock(idx) {
            const t = document.getElementById(`treasure-${idx}`); const rect = t.getBoundingClientRect(); t.classList.add('unlocked');
            const fly = document.createElement('div'); fly.className = "fly-icon fixed"; fly.style.zIndex="1000"; fly.innerText = database[idx].icon;
            fly.style.left = rect.left + 'px'; fly.style.top = rect.top + 'px'; document.body.appendChild(fly);
            const slot = document.getElementById(`slot-${unlockedCount}`); const slotRect = slot.getBoundingClientRect();
            setTimeout(() => { fly.style.left = slotRect.left + 'px'; fly.style.top = slotRect.top + 'px'; fly.style.transform = "scale(0.3) rotate(360deg)"; fly.style.opacity = "0"; }, 50);
            setTimeout(() => { slot.innerHTML = database[idx].icon; slot.classList.add('filled'); document.getElementById('map-panel').scrollLeft = slot.offsetLeft - 50; fly.remove(); }, 850);
            unlockedCount++; document.getElementById('progress-val').innerText = `${unlockedCount}/22`;
            playTone(880, 0.3, 0.1); if(navigator.vibrate) navigator.vibrate([30,30]);
            if(unlockedCount === 22) setTimeout(showFinalCeremony, 1500);
            else checkMilestone();
        }

        function showFinalCeremony() {
            gameActive = false;
            document.getElementById('final-ceremony').style.display = 'flex';
        }

        function playTone(f, d, v) { if(!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type="sine"; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }
        function playSummerBGM() { const m=[659, 659, 659, 523, 659, 783, 392, 523, 440, 392, 349, 330, 262]; let i=0; setInterval(() => { if(!gameActive) return; playTone(m[i%m.length], 0.8, 0.02); i++; }, 500); }
        function checkMilestone() { const ms=[{c:5,t:"初级破译员"},{c:10,t:"高级探险家"},{c:15,t:"金牌架构师"}]; const m=ms.find(x=>x.c===unlockedCount); if(m){ document.getElementById('m-title').innerText=m.t; document.getElementById('m-desc').innerText=`发现了 ${m.c} 个秘密！`; document.getElementById('milestone-modal').style.display='flex'; } }
    </script>
</body>
</html>
